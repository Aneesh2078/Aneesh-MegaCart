<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="strapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="335" rx="55" ry="10" fill="#000000" fill-opacity="0.1" />

  <!-- Straps -->
  <!-- Top Strap -->
  <path d="M165,80 L235,80 L225,160 L175,160 Z" fill="url(#strapGrad)" />
  <!-- Bottom Strap -->
  <path d="M175,240 L225,240 L235,320 L165,320 Z" fill="url(#strapGrad)" />
  
  <!-- Watch Case Shadow -->
  <circle cx="200" cy="200" r="75" fill="#000000" fill-opacity="0.15" />
  
  <!-- Watch Body Outer -->
  <circle cx="200" cy="200" r="70" fill="#374151" />
  <!-- Bezel -->
  <circle cx="200" cy="200" r="64" fill="#1F2937" />
  <!-- Screen Rim -->
  <circle cx="200" cy="200" r="60" fill="#030712" />
  
  <!-- Crown Button -->
  <rect x="268" y="185" width="8" height="30" rx="3" fill="#9CA3AF" />
  <rect x="268" y="193" width="8" height="14" fill="#4B5563" />

  <!-- Activity Rings / Screen UI -->
  <circle cx="200" cy="200" r="42" fill="none" stroke="#EF4444" stroke-width="6" stroke-dasharray="200, 100" stroke-linecap="round" />
  <circle cx="200" cy="200" r="32" fill="none" stroke="#10B981" stroke-width="6" stroke-dasharray="140, 100" stroke-linecap="round" transform="rotate(-90 200 200)" />
  <circle cx="200" cy="200" r="22" fill="none" stroke="#3B82F6" stroke-width="6" stroke-dasharray="80, 100" stroke-linecap="round" transform="rotate(45 200 200)" />
  
  <!-- Digital Time -->
  <text x="200" y="206" font-family="monospace, system-ui" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">10:09</text>
</svg>
