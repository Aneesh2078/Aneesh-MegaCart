<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7490" />
      <stop offset="100%" stop-color="#083344" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="325" rx="85" ry="12" fill="#000000" fill-opacity="0.1" />

  <!-- Top Handle -->
  <path d="M170,110 C170,95 230,95 230,110" fill="none" stroke="#374151" stroke-width="8" stroke-linecap="round" />

  <!-- Main Bag Body -->
  <path d="M130,310 L270,310 C280,310 290,300 290,280 L290,160 C290,120 250,105 200,105 C150,105 110,120 110,160 L110,280 C110,300 120,310 130,310 Z" fill="url(#bagGrad)" />

  <!-- Side Pocket Left -->
  <path d="M110,210 L98,210 C94,210 94,250 98,270 L110,270 Z" fill="#1E293B" />
  <path d="M110,240 L96,240" stroke="#0E7490" stroke-width="3" /> <!-- Mesh detail -->
  <path d="M110,255 L96,255" stroke="#0E7490" stroke-width="3" />

  <!-- Side Pocket Right -->
  <path d="M290,210 L302,210 C306,210 306,250 302,270 L290,270 Z" fill="#1E293B" />
  <path d="M290,240 L304,240" stroke="#0E7490" stroke-width="3" /> <!-- Mesh detail -->
  <path d="M290,255 L304,255" stroke="#0E7490" stroke-width="3" />

  <!-- Front Pocket Outer -->
  <path d="M140,305 L260,305 C270,305 275,295 275,280 L275,200 C275,185 260,180 200,180 C140,180 125,185 125,200 L125,280 C125,295 130,305 140,305 Z" fill="#1E293B" />

  <!-- Zipper paths -->
  <!-- Main Zipper line -->
  <path d="M125,150 C125,130 160,118 200,118 C240,118 275,130 275,150" fill="none" stroke="#64748B" stroke-width="3" stroke-dasharray="3,3" />
  <!-- Front Zipper line -->
  <path d="M130,195 L270,195" fill="none" stroke="#64748B" stroke-width="3" stroke-dasharray="3,3" />

  <!-- Front Pocket Accent Logo -->
  <rect x="185" y="230" width="30" height="20" rx="4" fill="#0E7490" />
  <path d="M193,240 L207,240 M200,235 L200,245" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
</svg>
