<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="305" rx="85" ry="12" fill="#000000" fill-opacity="0.1" />

  <!-- Gamepad Body Controller -->
  <path d="M 125,125 C 160,115 240,115 275,125 C 295,130 315,150 310,210 C 305,270 280,285 260,265 C 240,245 220,230 200,230 C 180,230 160,245 140,265 C 120,285 95,270 90,210 C 85,150 105,130 125,125 Z" fill="url(#controllerGrad)" stroke="#111827" stroke-width="2.5" />
  
  <!-- Left Grip Texture -->
  <path d="M 98,180 C 103,195 103,215 98,230" fill="none" stroke="#1F2937" stroke-width="4" stroke-linecap="round" />
  <!-- Right Grip Texture -->
  <path d="M 302,180 C 297,195 297,215 302,230" fill="none" stroke="#1F2937" stroke-width="4" stroke-linecap="round" />

  <!-- D-Pad (Left side) -->
  <g transform="translate(145, 175)" stroke="#111827" stroke-width="2" fill="#4B5563">
    <!-- Cross Shape -->
    <path d="M -8,-24 L 8,-24 L 8,-8 L 24,-8 L 24,8 L 8,8 L 8,24 L -8,24 L -8,8 L -24,8 L -24,-8 L -8,-8 Z" stroke-linejoin="round" />
    <circle cx="0" cy="0" r="4" fill="#1F2937" stroke="none" />
  </g>

  <!-- Left Thumbstick (Low) -->
  <circle cx="180" cy="205" r="20" fill="#1F2937" stroke="#111827" stroke-width="1.5" />
  <circle cx="180" cy="205" r="14" fill="#374151" />
  <circle cx="180" cy="205" r="6" fill="#111827" />

  <!-- Right Thumbstick (High-ish / Center-right) -->
  <circle cx="220" cy="205" r="20" fill="#1F2937" stroke="#111827" stroke-width="1.5" />
  <circle cx="220" cy="205" r="14" fill="#374151" />
  <circle cx="220" cy="205" r="6" fill="#111827" />

  <!-- Action Buttons (Right side: X, Y, A, B) -->
  <g transform="translate(255, 175)" font-family="sans-serif" font-weight="900" font-size="10" text-anchor="middle">
    <!-- Y (Top, Yellow) -->
    <circle cx="0" cy="-20" r="9" fill="#FBBF24" stroke="#111827" stroke-width="1" />
    <text x="0" y="-17" fill="#111827">Y</text>
    <!-- A (Bottom, Green) -->
    <circle cx="0" cy="20" r="9" fill="#10B981" stroke="#111827" stroke-width="1" />
    <text x="0" y="23" fill="#111827">A</text>
    <!-- X (Left, Blue) -->
    <circle cx="-20" cy="0" r="9" fill="#3B82F6" stroke="#111827" stroke-width="1" />
    <text x="-20" y="3" fill="#111827">X</text>
    <!-- B (Right, Red) -->
    <circle cx="20" cy="0" r="9" fill="#EF4444" stroke="#111827" stroke-width="1" />
    <text x="20" y="3" fill="#111827">B</text>
  </g>

  <!-- Menu / Options buttons (Tiny center buttons) -->
  <rect x="175" y="152" width="14" height="6" rx="2" fill="#4B5563" transform="rotate(-15 182 155)" />
  <rect x="210" y="152" width="14" height="6" rx="2" fill="#4B5563" transform="rotate(15 217 155)" />
  
  <!-- Glowing Center Power Button (Logo) -->
  <circle cx="200" cy="142" r="12" fill="#1F2937" stroke="#111827" stroke-width="1" />
  <circle cx="200" cy="142" r="8" fill="#10B981" filter="drop-shadow(0 0 2px #10B981)" /> <!-- Glowing logo -->
  <path d="M 197,140 Q 200,137 203,140 M 198,144 L 202,144" stroke="#1F2937" stroke-width="1.5" fill="none" />
</svg>
