<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="tvLandscape" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="40%" stop-color="#3B82F6" />
      <stop offset="70%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Base Stand Shadow -->
  <ellipse cx="200" cy="335" rx="80" ry="8" fill="#000000" fill-opacity="0.1" />

  <!-- TV Screen Outer Frame -->
  <rect x="50" y="100" width="300" height="180" rx="4" fill="#030712" stroke="#1F2937" stroke-width="3" />
  
  <!-- Screen Display Area (Landscape Art) -->
  <rect x="54" y="104" width="292" height="172" rx="2" fill="url(#tvLandscape)" />
  
  <!-- Abstract Hills/Sun in Display -->
  <circle cx="210" cy="180" r="35" fill="#FEF08A" opacity="0.8" />
  <path d="M 54,230 Q 150,190 220,240 T 346,210 L 346,276 L 54,276 Z" fill="#475569" opacity="0.7" />
  <path d="M 54,250 Q 110,220 180,260 T 346,240 L 346,276 L 54,276 Z" fill="#1E293B" />
  
  <!-- Screen reflection sheen -->
  <path d="M 54,104 L 150,104 L 54,200 Z" fill="#FFFFFF" opacity="0.12" />

  <!-- Slim metallic stand legs -->
  <!-- Left Leg -->
  <path d="M 120,283 L 110,328" stroke="#374151" stroke-width="5" stroke-linecap="round" />
  <path d="M 95,330 L 125,330" stroke="#374151" stroke-width="4" stroke-linecap="round" />
  <!-- Right Leg -->
  <path d="M 280,283 L 290,328" stroke="#374151" stroke-width="5" stroke-linecap="round" />
  <path d="M 275,330 L 305,330" stroke="#374151" stroke-width="4" stroke-linecap="round" />
  
  <!-- Soundbar / Logo indicator -->
  <circle cx="200" cy="281" r="1.5" fill="#EF4444" /> <!-- Tiny power LED indicator -->
</svg>
