<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="vrGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <linearGradient id="neonLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="300" rx="90" ry="12" fill="#000000" fill-opacity="0.2" />

  <!-- Headset Foam Padding (Behind the main body) -->
  <path d="M 120,135 C 100,140 100,240 120,245 L 280,245 C 300,240 300,140 280,135 Z" fill="#4B5563" />
  <!-- Nose cutout behind -->
  <path d="M 190,245 C 190,230 210,230 210,245" fill="#1F2937" />

  <!-- Headset Main Visor Body (Sleek curve) -->
  <path d="M 110,130 C 100,130 90,145 90,165 L 90,215 C 90,235 100,240 110,240 L 290,240 C 300,240 310,235 310,215 L 310,165 C 310,145 300,130 290,130 Z" fill="url(#vrGloss)" stroke="#374151" stroke-width="2.5" />

  <!-- Neon Glowing Curved Strip (Front face styling) -->
  <path d="M 115,185 Q 200,205 285,185" fill="none" stroke="url(#neonLight)" stroke-width="6" stroke-linecap="round" />
  <!-- Glow Blur simulation -->
  <path d="M 115,185 Q 200,205 285,185" fill="none" stroke="#60A5FA" stroke-width="12" stroke-linecap="round" opacity="0.3" />

  <!-- Front camera lenses (Inside visor face for AR passthrough) -->
  <circle cx="120" cy="155" r="5" fill="#000" stroke="#4B5563" stroke-width="1" />
  <circle cx="120" cy="155" r="2" fill="#1F2937" />

  <circle cx="280" cy="155" r="5" fill="#000" stroke="#4B5563" stroke-width="1" />
  <circle cx="280" cy="155" r="2" fill="#1F2937" />

  <!-- Head Strap Side Connector -->
  <rect x="75" y="170" width="16" height="20" rx="3" fill="#374151" />
  <rect x="309" y="170" width="16" height="20" rx="3" fill="#374151" />

  <!-- Fabric Straps wrapping back -->
  <path d="M 75,180 C 40,180 30,120 50,110" fill="none" stroke="#4B5563" stroke-width="8" opacity="0.6" />
  <path d="M 325,180 C 360,180 370,120 350,110" fill="none" stroke="#4B5563" stroke-width="8" opacity="0.6" />

  <!-- Brand logo indicator -->
  <text x="200" y="152" font-family="sans-serif" font-weight="900" font-size="8" fill="#4B5563" text-anchor="middle" letter-spacing="1">NEXUS VR</text>
</svg>
