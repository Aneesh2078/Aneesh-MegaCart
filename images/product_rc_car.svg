<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="carBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" /> <!-- Hot Red Racing Car -->
      <stop offset="50%" stop-color="#F87171" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadows -->
  <ellipse cx="200" cy="275" rx="120" ry="15" fill="#000000" fill-opacity="0.2" />

  <!-- Rear Wing/Spoiler -->
  <path d="M 80,150 L 120,135 L 120,180 L 80,185 Z" fill="#111827" stroke="#374151" stroke-width="1" />
  <path d="M 70,140 L 110,135 L 120,150 L 80,155 Z" fill="#EF4444" />
  <!-- Wing support struts -->
  <rect x="110" y="155" width="8" height="30" fill="#374151" />

  <!-- Car Body Chassis (Low Profile Racing Design) -->
  <path d="M 100,210 Q 140,170 210,165 Q 280,165 310,210 Q 330,225 320,240 Q 300,245 100,240 Q 80,230 100,210 Z" fill="url(#carBody)" stroke="#991B1B" stroke-width="2" />
  
  <!-- Cabin Windshield / Cockpit Glass -->
  <path d="M 170,195 Q 190,175 220,175 Q 250,175 260,195 Z" fill="#1E3A8A" opacity="0.8" stroke="#3B82F6" stroke-width="1.5" />
  <path d="M 180,192 Q 200,180 220,180" fill="none" stroke="#FFF" stroke-width="2" opacity="0.5" /> <!-- reflection -->

  <!-- Racing Decals / Stripe -->
  <path d="M 130,220 Q 200,212 300,220" fill="none" stroke="#FBBF24" stroke-width="6" /> <!-- Yellow stripe -->
  <text x="210" y="215" font-family="sans-serif" font-weight="900" font-size="10" fill="#FFF" font-style="italic">01</text>

  <!-- Wheels (Tough Offroad Tires) -->
  <!-- Rear Wheel (Left representation) -->
  <circle cx="140" cy="245" r="32" fill="url(#wheelGrad)" stroke="#1F2937" stroke-width="3" />
  <circle cx="140" cy="245" r="22" fill="#4B5563" />
  <!-- Spokes -->
  <circle cx="140" cy="245" r="14" fill="none" stroke="#FBBF24" stroke-width="3" />
  <circle cx="140" cy="245" r="4" fill="#D1D5DB" />

  <!-- Front Wheel (Right representation) -->
  <circle cx="280" cy="245" r="32" fill="url(#wheelGrad)" stroke="#1F2937" stroke-width="3" />
  <circle cx="280" cy="245" r="22" fill="#4B5563" />
  <!-- Spokes -->
  <circle cx="280" cy="245" r="14" fill="none" stroke="#FBBF24" stroke-width="3" />
  <circle cx="280" cy="245" r="4" fill="#D1D5DB" />

  <!-- Shock Absorber Spring (Visible above front wheel) -->
  <path d="M 270,213 C 270,190 280,190 280,213" fill="none" stroke="#F59E0B" stroke-dasharray="2 2" stroke-width="4" />

  <!-- Remote Antenna (Pointing up-back) -->
  <line x1="160" y1="180" x2="130" y2="100" stroke="#111827" stroke-width="2.5" />
  <!-- Little flag on antenna -->
  <path d="M 130,100 L 140,105 L 132,110 Z" fill="#EF4444" />
</svg>
