<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="phoneBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#4C1D95" />
    </linearGradient>
    <linearGradient id="screenWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="330" rx="70" ry="12" fill="#000000" fill-opacity="0.1" />

  <!-- Unfolded Phone Clamshell Perspective -->
  <!-- Upper Half -->
  <rect x="135" y="65" width="130" height="120" rx="14" fill="url(#phoneBody)" stroke="#C084FC" stroke-width="2" />
  <!-- Upper Screen -->
  <rect x="141" y="71" width="118" height="110" rx="10" fill="url(#screenWall)" />
  <!-- Wallpaper glow -->
  <circle cx="200" cy="180" r="50" fill="#EC4899" opacity="0.3" filter="blur(15px)" />
  <circle cx="180" cy="120" r="25" fill="#3B82F6" opacity="0.4" filter="blur(10px)" />
  
  <!-- Hinge Segment -->
  <rect x="131" y="186" width="138" height="8" rx="3" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1.5" />

  <!-- Lower Half -->
  <rect x="135" y="195" width="130" height="120" rx="14" fill="url(#phoneBody)" stroke="#C084FC" stroke-width="2" />
  <!-- Lower Screen -->
  <rect x="141" y="201" width="118" height="110" rx="10" fill="url(#screenWall)" />
  <!-- Wallpaper glow lower -->
  <circle cx="200" cy="201" r="50" fill="#EC4899" opacity="0.3" filter="blur(15px)" />
  
  <!-- Time UI on main display -->
  <text x="200" y="115" font-family="sans-serif" font-weight="900" font-size="20" fill="#FFFFFF" text-anchor="middle">10:09</text>
  <text x="200" y="130" font-family="sans-serif" font-weight="600" font-size="9" fill="#C084FC" text-anchor="middle" letter-spacing="1">MON, JUN 2</text>

  <!-- Camera bump on back (visible in fold perspective) -->
  <rect x="145" y="80" width="35" height="18" rx="4" fill="#111827" opacity="0.9" />
  <circle cx="154" cy="89" r="5" fill="#1F2937" stroke="#4B5563" stroke-width="1" />
  <circle cx="170" cy="89" r="5" fill="#1F2937" stroke="#4B5563" stroke-width="1" />
</svg>
