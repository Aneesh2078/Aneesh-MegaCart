<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="goldTitanium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
    <linearGradient id="lensGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="335" rx="55" ry="10" fill="#000000" fill-opacity="0.1" />

  <!-- Phone Back Outer Bezel -->
  <rect x="130" y="70" width="140" height="260" rx="24" fill="#78350F" />
  
  <!-- Back Cover (Gold Titanium) -->
  <rect x="134" y="74" width="132" height="252" rx="20" fill="url(#goldTitanium)" />
  
  <!-- Camera Bump Island -->
  <rect x="144" y="84" width="60" height="60" rx="12" fill="#78350F" fill-opacity="0.3" stroke="#D97706" stroke-width="1.5" />
  
  <!-- Triple Camera Lenses -->
  <!-- Lens 1 -->
  <circle cx="160" cy="100" r="14" fill="url(#lensGlass)" stroke="#D97706" stroke-width="2" />
  <circle cx="160" cy="100" r="6" fill="#030712" />
  <circle cx="163" cy="97" r="2" fill="#FFF" opacity="0.4" />
  
  <!-- Lens 2 -->
  <circle cx="188" cy="114" r="14" fill="url(#lensGlass)" stroke="#D97706" stroke-width="2" />
  <circle cx="188" cy="114" r="6" fill="#030712" />
  <circle cx="191" cy="111" r="2" fill="#FFF" opacity="0.4" />

  <!-- Lens 3 -->
  <circle cx="160" cy="128" r="14" fill="url(#lensGlass)" stroke="#D97706" stroke-width="2" />
  <circle cx="160" cy="128" r="6" fill="#030712" />
  <circle cx="163" cy="125" r="2" fill="#FFF" opacity="0.4" />

  <!-- LiDAR Sensor -->
  <circle cx="188" cy="94" r="5" fill="#1E293B" />
  <!-- Flash -->
  <circle cx="188" cy="134" r="6" fill="#FEF3C7" />
  <circle cx="188" cy="134" r="3" fill="#FBBF24" />

  <!-- Subtle Logo hint -->
  <circle cx="200" cy="200" r="12" fill="none" stroke="#FEF3C7" stroke-width="2" opacity="0.3" />
</svg>
