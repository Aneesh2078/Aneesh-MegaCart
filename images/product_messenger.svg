<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="leatherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350F" /> <!-- Rich Brown Leather -->
      <stop offset="100%" stop-color="#451A03" />
    </linearGradient>
    <linearGradient id="leatherFlap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="320" rx="100" ry="10" fill="#000000" fill-opacity="0.15" />

  <!-- Messenger Bag Body Box -->
  <rect x="100" y="110" width="200" height="180" rx="10" fill="url(#leatherGrad)" stroke="#451A03" stroke-width="2.5" />
  
  <!-- Outer Flap (Overlapping half body) -->
  <path d="M 100,110 L 300,110 L 300,230 C 300,240 290,250 280,250 L 120,250 C 110,250 100,240 100,230 Z" fill="url(#leatherFlap)" stroke="#451A03" stroke-width="1.5" />
  
  <!-- White stitching details along the flap edge -->
  <path d="M 105,115 L 295,115 L 295,225 C 295,232 290,242 280,242 L 120,242 C 110,242 105,232 105,225 Z" fill="none" stroke="#FBBF24" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7" />

  <!-- Buckles & Straps -->
  <!-- Left Strap -->
  <rect x="135" y="110" width="16" height="152" rx="1" fill="#451A03" />
  <rect x="135" y="240" width="16" height="24" rx="2" fill="#D1D5DB" stroke="#451A03" stroke-width="1.5" /> <!-- buckle -->
  <line x1="139" y1="248" x2="147" y2="248" stroke="#111827" stroke-width="2" />

  <!-- Right Strap -->
  <rect x="249" y="110" width="16" height="152" rx="1" fill="#451A03" />
  <rect x="249" y="240" width="16" height="24" rx="2" fill="#D1D5DB" stroke="#451A03" stroke-width="1.5" /> <!-- buckle -->
  <line x1="253" y1="248" x2="261" y2="248" stroke="#111827" stroke-width="2" />

  <!-- Top Handle -->
  <path d="M 160,110 C 160,95 240,95 240,110" fill="none" stroke="#451A03" stroke-width="8" stroke-linecap="round" />
  <path d="M 160,110 C 160,95 240,95 240,110" fill="none" stroke="#92400E" stroke-width="4" stroke-linecap="round" />

  <!-- Shoulder Strap Ring (Sides) -->
  <path d="M 100,160 L 90,165 L 90,185 L 100,190" fill="none" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round" />
  <path d="M 300,160 L 310,165 L 310,185 L 300,190" fill="none" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round" />

  <!-- Draped Shoulder Strap -->
  <path d="M 90,175 C 60,190 40,320 120,340 C 200,360 350,290 310,175" fill="none" stroke="#451A03" stroke-width="6" stroke-linecap="round" opacity="0.3" />
</svg>
