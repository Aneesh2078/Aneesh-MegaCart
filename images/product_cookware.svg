<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="panGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" /> <!-- Beautiful Cherry Red Cookware -->
      <stop offset="100%" stop-color="#BE185D" />
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadows -->
  <ellipse cx="160" cy="275" rx="75" ry="12" fill="#000000" fill-opacity="0.12" />
  <ellipse cx="260" cy="315" rx="80" ry="10" fill="#000000" fill-opacity="0.1" />

  <!-- BACK POT (Larger Cooking Casserole) -->
  <!-- Pot Body -->
  <rect x="95" y="140" width="130" height="110" rx="10" fill="url(#panGrad)" stroke="#4B5563" stroke-width="1.5" />
  <!-- Pot Base Rim -->
  <rect x="105" y="248" width="110" height="6" rx="2" fill="#9CA3AF" />
  <!-- Side Handles -->
  <rect x="75" y="170" width="20" height="16" rx="4" fill="#374151" />
  <rect x="225" y="170" width="20" height="16" rx="4" fill="#374151" />
  
  <!-- Lid -->
  <path d="M 90,140 L 230,140 L 220,126 L 100,126 Z" fill="#E5E7EB" stroke="#4B5563" stroke-width="1.5" />
  <!-- Glass Center Lid Panel -->
  <ellipse cx="160" cy="133" rx="50" ry="5" fill="#93C5FD" opacity="0.6" />
  <!-- Lid Knob -->
  <rect x="150" y="112" width="20" height="14" rx="3" fill="#374151" />

  <!-- FRONT PAN (Frying Pan / Skillet) -->
  <!-- Frying Pan Body -->
  <path d="M 180,270 L 330,270 A 75,30 0 0,1 180,270 Z" fill="url(#panGrad)" stroke="#4B5563" stroke-width="1.5" />
  <ellipse cx="255" cy="270" rx="74" ry="20" fill="url(#baseGrad)" stroke="#4B5563" stroke-width="1" />
  <!-- Frying Pan Shiny Inside Bottom -->
  <ellipse cx="255" cy="274" rx="55" ry="12" fill="#1F2937" />
  
  <!-- Pan Long Handle (Stainless Steel/Black) -->
  <path d="M 183,272 L 100,285 C 95,286 93,293 98,295 L 105,296 L 180,278 Z" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <!-- Handle Hanging Hole -->
  <circle cx="108" cy="291" r="3" fill="#FFF" />
</svg>
