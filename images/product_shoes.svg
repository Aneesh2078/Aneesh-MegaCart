<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="shoeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="310" rx="110" ry="12" fill="#000000" fill-opacity="0.1" />

  <!-- Shoe Group rotated for action dynamic look -->
  <g transform="translate(45, 60) rotate(-15 150 150)">
    <!-- Sole - White foam bottom -->
    <path d="M70,250 C110,255 180,255 270,230 C280,210 270,195 240,205 C180,225 110,225 70,225 C60,225 60,245 70,250 Z" fill="#FFFFFF" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.08))" />
    <!-- Sole Bottom - Black rubber tread -->
    <path d="M72,250 C110,255 180,255 270,230 C272,233 268,236 260,238 C180,260 110,260 72,252 Z" fill="#1F2937" />
    
    <!-- Shoe Upper Body -->
    <path d="M70,225 C65,190 85,140 120,130 C135,125 155,145 175,170 C195,190 230,195 255,200 C270,203 270,215 240,215 C180,225 110,225 70,225 Z" fill="url(#shoeGrad)" />
    
    <!-- Shoe Collar / Opening -->
    <path d="M110,135 C115,125 135,120 145,130 C150,135 140,150 130,155 C120,160 110,145 110,135 Z" fill="#1F2937" />
    
    <!-- Laces -->
    <path d="M150,155 L175,140 M160,170 L185,150 M170,185 L195,165" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    
    <!-- Deco lines -->
    <path d="M90,190 C120,180 160,200 200,190" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.3" stroke-linecap="round" />
    <path d="M95,200 C125,192 165,210 205,200" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round" />
  </g>
</svg>
