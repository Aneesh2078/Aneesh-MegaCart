<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="droneBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B5563" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Ground Shadow -->
  <ellipse cx="200" cy="330" rx="90" ry="12" fill="#000000" fill-opacity="0.1" />

  <!-- Quadcopter Arms -->
  <!-- Top-Left to Bottom-Right Arm -->
  <line x1="110" y1="110" x2="290" y2="290" stroke="#374151" stroke-width="12" stroke-linecap="round" />
  <!-- Top-Right to Bottom-Left Arm -->
  <line x1="290" y1="110" x2="110" y2="290" stroke="#374151" stroke-width="12" stroke-linecap="round" />

  <!-- Motor Pods at Arm Ends -->
  <circle cx="110" cy="110" r="14" fill="#111827" stroke="#9CA3AF" stroke-width="2" />
  <circle cx="290" cy="110" r="14" fill="#111827" stroke="#9CA3AF" stroke-width="2" />
  <circle cx="110" cy="290" r="14" fill="#111827" stroke="#9CA3AF" stroke-width="2" />
  <circle cx="290" cy="290" r="14" fill="#111827" stroke="#9CA3AF" stroke-width="2" />

  <!-- Propeller Blades (Semi-transparent motion blur rings) -->
  <ellipse cx="110" cy="110" rx="45" ry="10" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-opacity="0.3" transform="rotate(-15 110 110)" />
  <ellipse cx="290" cy="110" rx="45" ry="10" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-opacity="0.3" transform="rotate(15 290 110)" />
  <ellipse cx="110" cy="290" rx="45" ry="10" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-opacity="0.3" transform="rotate(15 110 290)" />
  <ellipse cx="290" cy="290" rx="45" ry="10" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-opacity="0.3" transform="rotate(-15 290 290)" />

  <!-- Central Fuselage (Drone Core Body) -->
  <path d="M 160,200 C 160,165 240,165 240,200 C 240,235 160,235 160,200 Z" fill="url(#droneBody)" stroke="#111827" stroke-width="2" />
  
  <!-- Cool neon green indicator strip on body -->
  <rect x="180" y="196" width="40" height="8" rx="4" fill="#10B981" />
  
  <!-- Legs / Landing Skids (Front perspective) -->
  <path d="M 165,225 L 155,270 L 140,270" fill="none" stroke="#1F2937" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 235,225 L 245,270 L 260,270" fill="none" stroke="#1F2937" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- 4K Camera Gimbal (Hanging underneath) -->
  <g transform="translate(185, 222)" stroke="#111827" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 15,0 L 15,12 L 5,12" />
    <circle cx="5" cy="18" r="10" fill="#1F2937" />
    <circle cx="5" cy="18" r="4" fill="#0891B2" /> <!-- Camera glass lens -->
    <path d="M 8,14 L 10,12" />
  </g>
</svg>
