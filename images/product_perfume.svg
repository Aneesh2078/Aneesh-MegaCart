<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="perfumeLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74" />
      <stop offset="60%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>
    <linearGradient id="goldCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="335" rx="55" ry="8" fill="#000000" fill-opacity="0.1" />

  <!-- Glass Bottle Outer Body -->
  <rect x="135" y="145" width="130" height="170" rx="20" fill="#FFFFFF" fill-opacity="0.6" stroke="#E5E7EB" stroke-width="3.5" />
  
  <!-- Liquid Chamber (Inner Glass) -->
  <rect x="145" y="165" width="110" height="140" rx="12" fill="url(#perfumeLiquid)" stroke="#C2410C" stroke-width="1.5" />
  
  <!-- Glass Reflections overlay -->
  <path d="M 145,165 L 205,165 L 145,260 Z" fill="#FFFFFF" opacity="0.25" />
  <path d="M 255,230 L 255,305 L 235,305 Z" fill="#FFFFFF" opacity="0.15" />

  <!-- Gold Neck Collar -->
  <rect x="175" y="130" width="50" height="15" fill="url(#goldCap)" stroke="#D97706" stroke-width="1.5" />

  <!-- Sprayer nozzle stem inside bottle -->
  <line x1="200" y1="145" x2="200" y2="280" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round" />

  <!-- Luxury Rectangular Glass Cap -->
  <rect x="165" y="80" width="70" height="50" rx="6" fill="#FFFFFF" fill-opacity="0.4" stroke="#E5E7EB" stroke-width="2.5" />
  <rect x="178" y="92" width="44" height="26" rx="2" fill="url(#goldCap)" opacity="0.2" />

  <!-- Front Brand Label Plaque -->
  <rect x="165" y="210" width="70" height="40" rx="4" fill="#FFFFFF" stroke="#D97706" stroke-width="1" />
  <text x="200" y="228" font-family="serif" font-weight="900" font-size="10" fill="#111827" text-anchor="middle" letter-spacing="1">ELIXIR</text>
  <text x="200" y="240" font-family="sans-serif" font-weight="500" font-size="6" fill="#D97706" text-anchor="middle" letter-spacing="0.5">PARFUM</text>
</svg>
