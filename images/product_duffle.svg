<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="bagFabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7490" /> <!-- Teal/Indigo Sporty Theme -->
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="310" rx="125" ry="12" fill="#000000" fill-opacity="0.15" />

  <!-- Duffle Bag Body (Rounded Cylinder) -->
  <rect x="80" y="140" width="240" height="150" rx="60" fill="url(#bagFabric)" stroke="#1F2937" stroke-width="2" />
  
  <!-- Left & Right End-Caps Highlights (makes it look 3D cylindrical) -->
  <ellipse cx="120" cy="215" rx="20" ry="73" fill="#1F2937" opacity="0.3" />
  <ellipse cx="280" cy="215" rx="20" ry="73" fill="#000" opacity="0.4" />

  <!-- Side Zipper Pocket (Left) -->
  <path d="M 82,180 A 40,65 0 0,0 82,250" fill="none" stroke="#4B5563" stroke-width="2" />
  <!-- Zipper Puller -->
  <rect x="76" y="210" width="4" height="10" rx="1" fill="#D1D5DB" />

  <!-- Front Pocket -->
  <path d="M 130,175 L 270,175 L 260,250 L 140,250 Z" fill="#111827" opacity="0.3" stroke="#4B5563" stroke-width="1.5" />
  <!-- Front pocket zipper -->
  <line x1="140" y1="185" x2="260" y2="185" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 2" />
  <rect x="195" y="181" width="8" height="6" rx="1" fill="#D1D5DB" />

  <!-- Carrying Webbing Straps (Vertical Bands) -->
  <!-- Left Vertical Band -->
  <rect x="145" y="120" width="16" height="145" rx="2" fill="#1F2937" stroke="#111827" stroke-width="1" />
  <line x1="153" y1="120" x2="153" y2="265" stroke="#4B5563" stroke-width="1" stroke-dasharray="3 3" />
  
  <!-- Right Vertical Band -->
  <rect x="239" y="120" width="16" height="145" rx="2" fill="#1F2937" stroke="#111827" stroke-width="1" />
  <line x1="247" y1="120" x2="247" y2="265" stroke="#4B5563" stroke-width="1" stroke-dasharray="3 3" />

  <!-- Handles Connecting Loop (Top Grip) -->
  <path d="M 145,120 C 145,90 255,90 255,120" fill="none" stroke="#1F2937" stroke-width="10" stroke-linecap="round" />
  <!-- Handle Leather wrap in middle -->
  <rect x="180" y="85" width="40" height="14" rx="3" fill="#FBBF24" />

  <!-- Adjustable Shoulder Strap (Draped over back) -->
  <path d="M 100,160 C 80,110 320,110 300,160" fill="none" stroke="#111827" stroke-width="5" stroke-dasharray="8 4" opacity="0.6" />
  <!-- Shoulder pad -->
  <path d="M 170,121 C 180,118 220,118 230,121" fill="none" stroke="#374151" stroke-width="10" stroke-linecap="round" />
</svg>
