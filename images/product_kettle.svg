<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="kettleMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD" /> <!-- Teal/Blue Metallic Gloss -->
      <stop offset="35%" stop-color="#3B82F6" />
      <stop offset="70%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="340" rx="75" ry="12" fill="#000000" fill-opacity="0.15" />

  <!-- Power Base (Bottom) -->
  <rect x="130" y="315" width="140" height="18" rx="6" fill="#1F2937" stroke="#111827" stroke-width="1.5" />
  <line x1="140" y1="324" x2="260" y2="324" stroke="#4B5563" stroke-width="1.5" />

  <!-- Kettle Body (Slightly tapered cylinder) -->
  <path d="M 155,140 L 245,140 L 255,305 L 145,305 Z" fill="url(#kettleMetal)" stroke="#111827" stroke-width="2" />
  <!-- Base Steel Trim of Kettle -->
  <path d="M 145,295 L 255,295 L 255,305 L 145,305 Z" fill="#D1D5DB" stroke="#1F2937" stroke-width="1" />

  <!-- Water Level Measurement Window (transparent glass strip) -->
  <rect x="195" y="170" width="10" height="90" rx="3" fill="#1E2937" opacity="0.8" />
  <!-- Measurement ticks -->
  <line x1="205" y1="180" x2="209" y2="180" stroke="#FFF" stroke-width="1" />
  <line x1="205" y1="200" x2="209" y2="200" stroke="#FFF" stroke-width="1" />
  <line x1="205" y1="220" x2="209" y2="220" stroke="#FFF" stroke-width="1" />
  <line x1="205" y1="240" x2="209" y2="240" stroke="#FFF" stroke-width="1" />
  <!-- Bubbles/Water level inside strip -->
  <path d="M 195,215 L 205,215 L 205,260 L 195,260 Z" fill="#60A5FA" opacity="0.6" />
  <circle cx="200" cy="225" r="1.5" fill="#FFF" opacity="0.8" />
  <circle cx="202" cy="235" r="1" fill="#FFF" opacity="0.8" />

  <!-- Spout -->
  <path d="M 155,145 L 125,160 L 125,185 C 130,195 145,190 148,180 Z" fill="#1F2937" stroke="#111827" stroke-width="1.5" />
  
  <!-- Lid -->
  <path d="M 150,140 C 150,125 250,125 250,140 Z" fill="#1F2937" stroke="#111827" stroke-width="1.5" />
  <!-- Lid Button/Hinge -->
  <rect x="235" y="132" width="10" height="12" rx="2" fill="#D1D5DB" />

  <!-- D-Shaped Handle (with power button) -->
  <path d="M 245,152 C 290,165 295,275 255,295" fill="none" stroke="#1F2937" stroke-width="22" stroke-linecap="round" />
  <path d="M 245,152 C 290,165 295,275 255,295" fill="none" stroke="#374151" stroke-width="16" stroke-linecap="round" />
  <!-- Power switch on handle -->
  <rect x="268" y="165" width="6" height="15" rx="2" fill="#EF4444" /> <!-- Red indicator -->
</svg>
