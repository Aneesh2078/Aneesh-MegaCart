<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="speakerBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="50%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="rgbGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="330" rx="65" ry="12" fill="#000000" fill-opacity="0.12" />

  <!-- Speaker Body Cylinder -->
  <rect x="140" y="90" width="120" height="230" rx="60" fill="url(#speakerBody)" stroke="#4B5563" stroke-width="2" />
  
  <!-- Metallic Grill mesh hints (Grid lines on center) -->
  <g opacity="0.15" stroke="#FFFFFF" stroke-width="1.5">
    <!-- Horizontal lines -->
    <line x1="145" y1="140" x2="255" y2="140" />
    <line x1="142" y1="160" x2="258" y2="160" />
    <line x1="141" y1="180" x2="259" y2="180" />
    <line x1="140" y1="200" x2="260" y2="200" />
    <line x1="141" y1="220" x2="259" y2="220" />
    <line x1="142" y1="240" x2="258" y2="240" />
    <line x1="145" y1="260" x2="255" y2="260" />
    
    <!-- Diagonal grid pattern -->
    <path d="M 145,140 L 255,250 M 145,180 L 255,290 M 145,95 L 255,205" />
    <path d="M 255,140 L 145,250 M 255,180 L 145,290 M 255,95 L 145,205" />
  </g>
  
  <!-- LED Ring Top -->
  <ellipse cx="200" cy="115" rx="52" ry="12" fill="none" stroke="url(#rgbGlow)" stroke-width="4" filter="drop-shadow(0 0 4px #06B6D4)" />
  <!-- LED Ring Bottom -->
  <ellipse cx="200" cy="295" rx="52" ry="12" fill="none" stroke="url(#rgbGlow)" stroke-width="4" filter="drop-shadow(0 0 4px #06B6D4)" />
  
  <!-- Top Lid cap -->
  <path d="M 142,105 C 142,90 258,90 258,105 Z" fill="#111827" />

  <!-- Control Buttons (Outlines) -->
  <g transform="translate(180, 180)" stroke="#9CA3AF" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Minus -->
    <path d="M -15,0 L -5,0" />
    <!-- Play -->
    <path d="M 0,-7 L 10,0 L 0,7 Z" fill="#9CA3AF" stroke-width="1" />
    <!-- Plus -->
    <path d="M 20,0 L 30,0 M 25,-5 L 25,5" />
  </g>

  <!-- Carry strap loop on top -->
  <path d="M 170,90 C 170,60 230,60 230,90" fill="none" stroke="#6B7280" stroke-width="6" stroke-linecap="round" />
</svg>
