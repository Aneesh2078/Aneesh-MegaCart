<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="vacuumGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <circle cx="200" cy="210" r="115" fill="#000000" fill-opacity="0.15" />

  <!-- Outer Bumper Rim -->
  <circle cx="200" cy="200" r="110" fill="#1F2937" stroke="#4B5563" stroke-width="2" />
  <!-- Bumper slit -->
  <path d="M 100,140 A 110,110 0 0,1 300,140" fill="none" stroke="#111827" stroke-width="4" />
  
  <!-- Vacuum Body Inner -->
  <circle cx="200" cy="200" r="102" fill="url(#vacuumGloss)" />
  
  <!-- Reflection -->
  <path d="M 120,120 A 102,102 0 0,1 280,120 A 102,102 0 0,0 120,120" fill="#FFFFFF" opacity="0.12" />

  <!-- LiDAR Sensor Dome (Center) -->
  <circle cx="200" cy="200" r="30" fill="#111827" stroke="#4B5563" stroke-width="2.5" />
  <circle cx="200" cy="200" r="26" fill="#1F2937" />
  <rect x="185" y="194" width="30" height="6" rx="2" fill="#06B6D4" opacity="0.8" /> <!-- Laser lens emitter -->

  <!-- Control Buttons -->
  <!-- Power button -->
  <circle cx="200" cy="260" r="10" fill="#1F2937" stroke="#4B5563" stroke-width="1.5" />
  <path d="M 200,255 L 200,261 M 197,257 A 5,5 0 1,0 203,257" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" />

  <!-- Home button -->
  <circle cx="176" cy="254" r="8" fill="#1F2937" stroke="#4B5563" stroke-width="1.5" />
  <path d="M 172,256 L 176,251 L 180,256 L 178,256 L 178,258 L 174,258 L 174,256 Z" fill="none" stroke="#9CA3AF" stroke-width="1.5" />

  <!-- Charge button -->
  <circle cx="224" cy="254" r="8" fill="#1F2937" stroke="#4B5563" stroke-width="1.5" />
  <path d="M 224,249 L 221,254 L 224,254 L 224,259 L 227,254 L 224,254 Z" fill="#9CA3AF" />

  <!-- Brand logo hint -->
  <text x="200" y="155" font-family="sans-serif" font-weight="800" font-size="10" fill="#4B5563" text-anchor="middle" letter-spacing="1">CLEANER PRO</text>
</svg>
