<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="screenWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="335" rx="60" ry="10" fill="#000000" fill-opacity="0.1" />

  <!-- Phone Body Shadow -->
  <rect x="125" y="75" width="150" height="250" rx="24" fill="#000000" fill-opacity="0.15" />
  
  <!-- Outer Bezel -->
  <rect x="120" y="70" width="160" height="260" rx="28" fill="#1F2937" stroke="#9CA3AF" stroke-width="2" />
  <!-- Inner Rim -->
  <rect x="124" y="74" width="152" height="252" rx="24" fill="#030712" />
  
  <!-- Screen -->
  <rect x="128" y="78" width="144" height="244" rx="20" fill="url(#screenWall)" />
  
  <!-- Screen Reflection overlay -->
  <rect x="128" y="78" width="144" height="244" rx="20" fill="url(#reflection)" />

  <!-- Dynamic Island / Camera Notch -->
  <rect x="175" y="86" width="50" height="12" rx="6" fill="#030712" />
  <!-- Speaker slit -->
  <rect x="190" y="80" width="20" height="2" rx="1" fill="#4B5563" />
  
  <!-- Camera lens reflection hint inside Dynamic Island -->
  <circle cx="183" cy="92" r="3" fill="#1F2937" />
  <circle cx="183" cy="92" r="1.2" fill="#06B6D4" />

  <!-- Abstract UI indicators on Screen -->
  <!-- Status bar -->
  <rect x="140" y="88" width="15" height="6" rx="2" fill="#FFFFFF" fill-opacity="0.8" />
  <circle cx="250" cy="91" r="2.5" fill="#FFFFFF" fill-opacity="0.8" />
  <circle cx="258" cy="91" r="2.5" fill="#FFFFFF" fill-opacity="0.8" />

  <!-- Bottom Home indicator bar -->
  <rect x="170" y="312" width="60" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.7" />
</svg>
