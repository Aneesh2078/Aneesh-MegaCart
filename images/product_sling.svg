<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="slingFabric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F3F46" /> <!-- Sleek Carbon/Dark Gray -->
      <stop offset="100%" stop-color="#18181B" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="330" rx="60" ry="10" fill="#000000" fill-opacity="0.15" />

  <!-- Main Diagonal Crossbody Strap (Extended background) -->
  <path d="M 120,60 L 280,340" stroke="#1F2937" stroke-width="24" stroke-linecap="round" opacity="0.8" />
  <path d="M 120,60 L 280,340" stroke="#3F3F46" stroke-width="18" stroke-linecap="round" opacity="0.8" />
  
  <!-- Quick release plastic buckle on strap -->
  <rect x="180" y="165" width="22" height="30" rx="3" fill="#111827" transform="rotate(30, 191, 180)" stroke="#4B5563" stroke-width="1" />
  <line x1="184" y1="180" x2="204" y2="170" stroke="#EF4444" stroke-width="2" /> <!-- red release line -->

  <!-- Sling Bag Body (Teardrop / Triangle shape, Ergonomic) -->
  <path d="M 180,120 C 230,120 250,220 230,280 C 210,310 160,300 150,270 C 130,220 140,120 180,120 Z" fill="url(#slingFabric)" stroke="#18181B" stroke-width="2" />
  
  <!-- Front Zipper Line (Curved Diagonal) -->
  <path d="M 175,140 Q 210,200 190,260" fill="none" stroke="#D1D5DB" stroke-width="2.5" stroke-dasharray="4 2" />
  <!-- Zipper pull tag -->
  <rect x="194" y="190" width="6" height="15" rx="1" fill="#EF4444" />

  <!-- Secondary Front Pocket -->
  <path d="M 155,220 C 180,225 210,235 220,265 C 205,295 165,290 155,270 Z" fill="#27272A" stroke="#3F3F46" stroke-width="1" />
  
  <!-- Reflective safety strip -->
  <path d="M 160,285 Q 185,275 210,282" fill="none" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.9" />

  <!-- USB charging port on the side -->
  <rect x="226" y="230" width="10" height="18" rx="2" fill="#111827" />
  <rect x="229" y="236" width="4" height="6" fill="#D1D5DB" />
</svg>
