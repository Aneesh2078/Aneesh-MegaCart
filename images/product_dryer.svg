<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="dryerBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#BE185D" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="335" rx="75" ry="10" fill="#000000" fill-opacity="0.1" />

  <!-- Dryer Group rotated for dynamic look -->
  <g transform="translate(60, 40) rotate(15 150 150)">
    <!-- Hanging Power Cord -->
    <path d="M 150,265 C 150,300 130,310 145,335 C 150,345 160,335 155,320" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="round" />

    <!-- Grip Handle -->
    <rect x="125" y="170" width="42" height="110" rx="12" fill="url(#dryerBody)" stroke="#9D174D" stroke-width="2" />
    
    <!-- Controls (Switches on Handle) -->
    <rect x="135" y="195" width="8" height="18" rx="2" fill="#111827" />
    <circle cx="139" cy="200" r="4" fill="#E5E7EB" /> <!-- Speed Switch -->
    <rect x="135" y="225" width="8" height="18" rx="2" fill="#111827" />
    <circle cx="139" cy="237" r="4" fill="#E5E7EB" /> <!-- Heat Switch -->

    <!-- Main Cylinder Nozzle Barrel -->
    <path d="M 85,90 C 85,90 230,70 230,110 C 230,150 85,170 85,170 Z" fill="url(#dryerBody)" stroke="#9D174D" stroke-width="2" />
    
    <!-- Front Grill Concentrator Nozzle -->
    <rect x="75" y="94" width="10" height="72" rx="3" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <line x1="77" y1="105" x2="83" y2="105" stroke="#4B5563" stroke-width="2" />
    <line x1="77" y1="130" x2="83" y2="130" stroke="#4B5563" stroke-width="2" />
    <line x1="77" y1="155" x2="83" y2="155" stroke="#4B5563" stroke-width="2" />

    <!-- Back Fan Filter Cap -->
    <path d="M 230,105 C 235,105 240,115 240,130 C 240,145 235,155 230,155 Z" fill="#1F2937" stroke="#111827" stroke-width="1.5" />
    <circle cx="233" cy="130" r="4" fill="#D1D5DB" />
  </g>
</svg>
