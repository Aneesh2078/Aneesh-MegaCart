<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>
    <linearGradient id="mixerRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
    <linearGradient id="metalBowl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9CA3AF" />
      <stop offset="50%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="330" rx="100" ry="12" fill="#000000" fill-opacity="0.1" />

  <!-- Stand Mixer Base -->
  <path d="M 110,310 L 290,310 C 300,310 300,300 290,290 L 270,250 L 260,140 C 260,110 230,90 200,90 L 130,90 C 110,90 100,105 100,120 L 100,150 C 100,160 110,165 120,165 L 200,165 C 210,165 220,170 220,185 L 220,280 L 110,280 C 100,280 100,310 110,310 Z" fill="url(#mixerRed)" stroke="#7F1D1D" stroke-width="2" />
  
  <!-- Stainless Steel Mixing Bowl -->
  <path d="M 115,190 L 205,190 C 215,220 205,275 160,275 C 115,275 105,220 115,190 Z" fill="url(#metalBowl)" stroke="#4B5563" stroke-width="2" />
  
  <!-- Bowl Handle -->
  <path d="M 110,205 C 95,205 95,245 110,245" fill="none" stroke="#D1D5DB" stroke-width="4" stroke-linecap="round" />

  <!-- Speed control dial knob -->
  <circle cx="240" cy="130" r="12" fill="#D1D5DB" stroke="#4B5563" stroke-width="1.5" />
  <line x1="240" y1="130" x2="248" y2="122" stroke="#111827" stroke-width="3" stroke-linecap="round" />
  
  <!-- Silver hinge lock / trim -->
  <rect x="218" y="152" width="22" height="8" rx="2" fill="#D1D5DB" stroke="#4B5563" stroke-width="1" />
  <rect x="130" y="150" width="55" height="15" rx="3" fill="#D1D5DB" stroke="#4B5563" stroke-width="1" /> <!-- Beater hub -->
  
  <!-- Beater wire hint -->
  <path d="M 157,165 C 157,195 152,205 160,205 C 168,205 163,195 163,165" fill="none" stroke="#9CA3AF" stroke-width="2.5" />
</svg>
