<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.8" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.7" stroke-opacity="0.3"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <!-- Grid Overlay -->
  <rect width="1200" height="400" fill="url(#grid)" />
  
  <!-- Glowing blobs -->
  <circle cx="850" cy="200" r="180" fill="url(#glowGrad)" filter="blur(60px)" opacity="0.35" />
  <circle cx="200" cy="100" r="120" fill="#3B82F6" filter="blur(50px)" opacity="0.15" />

  <!-- Abstract Vector Shapes/Tech Lines -->
  <path d="M 600,-50 L 1100,450" stroke="#334155" stroke-width="2" stroke-opacity="0.2" />
  <path d="M 500,-50 L 1000,450" stroke="#334155" stroke-width="4" stroke-opacity="0.1" />
  <circle cx="850" cy="200" r="140" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="10, 15" stroke-opacity="0.5" />
  <circle cx="850" cy="200" r="100" fill="none" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.4" />
  
  <!-- Floating Tech Ornaments -->
  <!-- Laptop Outline (Right Side) -->
  <g transform="translate(740, 120)" stroke="#60A5FA" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <rect x="30" y="20" width="130" height="85" rx="6" stroke="#60A5FA" stroke-width="3.5" />
    <path d="M 10,105 L 180,105 L 165,120 L 25,120 Z" />
    <rect x="75" y="109" width="40" height="6" rx="1" stroke-width="2" />
    <!-- Laptop screen glow lines -->
    <path d="M 50,40 L 140,40 M 50,55 L 120,55 M 50,70 L 100,70" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.8" />
  </g>

  <!-- Smartphone Outline -->
  <g transform="translate(930, 160)" stroke="#34D399" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <rect x="10" y="10" width="55" height="100" rx="10" />
    <!-- Dynamic island -->
    <rect x="25" y="16" width="25" height="6" rx="3" fill="#34D399" stroke="none" />
    <!-- Apps grid wireframe -->
    <circle cx="23" cy="38" r="4" stroke="#A7F3D0" stroke-width="1.5" />
    <circle cx="37" cy="38" r="4" stroke="#A7F3D0" stroke-width="1.5" />
    <circle cx="51" cy="38" r="4" stroke="#A7F3D0" stroke-width="1.5" />
    <circle cx="23" cy="52" r="4" stroke="#A7F3D0" stroke-width="1.5" />
    <circle cx="37" cy="52" r="4" stroke="#A7F3D0" stroke-width="1.5" />
    <circle cx="51" cy="52" r="4" stroke="#A7F3D0" stroke-width="1.5" />
  </g>

  <!-- Headphones outline -->
  <g transform="translate(640, 190)" stroke="#FBBF24" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 20,60 C 20,20 80,20 80,60" stroke-width="4" />
    <rect x="10" y="55" width="16" height="30" rx="6" fill="#FBBF24" stroke="none" />
    <rect x="74" y="55" width="16" height="30" rx="6" fill="#FBBF24" stroke="none" />
    <path d="M 26,60 L 26,80 M 74,60 L 74,80" />
  </g>

  <!-- Decorative text / branding banner layout -->
  <!-- Left Side Text Graphic -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="120" height="24" rx="12" fill="#3B82F6" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1" />
    <text x="60" y="15" fill="#60A5FA" font-family="sans-serif" font-weight="900" font-size="10" text-anchor="middle" letter-spacing="1">LIMITED TIME ONLY</text>
    
    <text x="0" y="75" fill="#FFFFFF" font-family="sans-serif" font-weight="900" font-size="44" letter-spacing="-1">MEGA ELECTRONICS</text>
    <text x="0" y="120" fill="#FBBF24" font-family="sans-serif" font-weight="900" font-size="44" letter-spacing="-1">CARNIVAL SALE</text>
    
    <text x="0" y="155" fill="#94A3B8" font-family="sans-serif" font-weight="500" font-size="16">Up to 80% Off on Laptops, Mobiles &amp; Audio Gears</text>
    
    <!-- Rating Badge in Banner -->
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="160" height="30" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1" />
      <text x="12" y="19" fill="#FBBF24" font-family="sans-serif" font-weight="bold" font-size="14">★★★★★</text>
      <text x="80" y="19" fill="#E2E8F0" font-family="sans-serif" font-weight="600" font-size="11">TRUSTED STORES</text>
    </g>
  </g>

  <!-- Neon lights accents -->
  <circle cx="1120" cy="50" r="4" fill="#60A5FA" />
  <circle cx="1150" cy="180" r="3" fill="#34D399" />
  <circle cx="680" cy="80" r="5" fill="#FBBF24" />
</svg>
