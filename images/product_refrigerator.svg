<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9CA3AF" />
      <stop offset="25%" stop-color="#D1D5DB" />
      <stop offset="50%" stop-color="#E5E7EB" />
      <stop offset="85%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Shadow -->
  <ellipse cx="200" cy="350" rx="90" ry="12" fill="#000000" fill-opacity="0.15" />

  <!-- Fridge Body -->
  <rect x="110" y="50" width="180" height="290" rx="12" fill="url(#steelGrad)" stroke="#4B5563" stroke-width="2" />

  <!-- Double Door Divider Line -->
  <line x1="200" y1="50" x2="200" y2="340" stroke="#374151" stroke-width="2" />

  <!-- Freezer & Fridge horizontal splits (It is a french door fridge) -->
  <line x1="110" y1="180" x2="290" y2="180" stroke="#374151" stroke-width="2.5" />

  <!-- Left Door Handle -->
  <rect x="186" y="80" width="6" height="80" rx="3" fill="#374151" />
  <rect x="187" y="82" width="4" height="76" rx="2" fill="#9CA3AF" />

  <!-- Right Door Handle -->
  <rect x="208" y="80" width="6" height="80" rx="3" fill="#374151" />
  <rect x="209" y="82" width="4" height="76" rx="2" fill="#9CA3AF" />

  <!-- Lower Drawer Handles -->
  <rect x="140" y="192" width="120" height="6" rx="3" fill="#374151" />
  <rect x="140" y="242" width="120" height="6" rx="3" fill="#374151" />

  <!-- Smart Screen (on the right door) -->
  <rect x="218" y="75" width="54" height="85" rx="4" fill="url(#screenGrad)" stroke="#374151" stroke-width="2" />
  <!-- Smart Screen UI components -->
  <rect x="224" y="82" width="42" height="2" rx="1" fill="#06B6D4" /> <!-- cyan top indicator -->
  <text x="245" y="105" font-family="sans-serif" font-weight="bold" font-size="16" fill="#F3F4F6" text-anchor="middle">22°</text>
  <text x="245" y="116" font-family="sans-serif" font-size="6" fill="#9CA3AF" text-anchor="middle">FRIDGE TEMP</text>
  <circle cx="236" cy="138" r="4" fill="#10B981" /> <!-- green check -->
  <circle cx="254" cy="138" r="4" fill="#3B82F6" /> <!-- blue Wi-Fi -->
  <path d="M 252,137 A 2,2 0 0,1 256,137" fill="none" stroke="#FFF" stroke-width="0.8" />
  
  <!-- Water Dispenser (on the left door) -->
  <rect x="135" y="115" width="40" height="50" rx="4" fill="#374151" />
  <rect x="140" y="120" width="30" height="30" rx="2" fill="#1F2937" />
  <!-- Water droplet icon -->
  <path d="M 155,130 C 155,135 160,135 160,130 C 160,126 155,123 155,123 C 155,123 150,126 150,130 C 150,135 155,135 155,130 Z" fill="#60A5FA" />
  <!-- Push lever -->
  <line x1="155" y1="150" x2="155" y2="160" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" />
</svg>
